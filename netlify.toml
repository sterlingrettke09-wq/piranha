[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.20.0"

[[edge_functions]]
  path = "/*"
  function = "og"
  # Only HTML page requests need OG-tag rewriting. Exclude static assets so the
  # edge function doesn't needlessly fire on images, fonts, icons, sitemap, etc.
  excludedPath = [
    "/assets/*",
    "/logo/*",
    "/cities/*",
    "/.netlify/*",
    "/*.png",
    "/*.jpg",
    "/*.jpeg",
    "/*.svg",
    "/*.ico",
    "/*.webp",
    "/*.woff",
    "/*.woff2",
    "/*.xml",
    "/*.txt",
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
